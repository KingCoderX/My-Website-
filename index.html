<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gaming Zone Pro</title>

<style>
/* 🌌 Animated Gaming Background */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #000000, #001a33, #000000, #330033);
  background-size: 400% 400%;
  animation: bg 10s infinite ease-in-out;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* 🔥 Header Neon */
header {
  padding: 25px;
  font-size: 32px;
  font-weight: bold;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #0066ff;
  background: rgba(0,0,0,0.6);
}

/* 🎮 Game Cards */
.container {
  margin-top: 40px;
}

.game-box {
  display: inline-block;
  width: 220px;
  height: 130px;
  margin: 15px;
  line-height: 130px;
  font-size: 18px;

  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  border: 2px solid #00ffcc;

  color: #00ffcc;
  box-shadow: 0 0 15px #00ffcc;

  transition: 0.3s;
  cursor: pointer;
}

/* ⚡ Hover Glow */
.game-box:hover {
  transform: scale(1.15);
  background: linear-gradient(90deg, #00ffcc, #0066ff);
  color: black;
  box-shadow: 0 0 25px #00ffcc, 0 0 50px #0066ff;
}

/* 🌟 Footer */
footer {
  margin-top: 50px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  color: #ff00ff;
  text-shadow: 0 0 10px #ff00ff;
}
</style>
</head>

<body>

<header>🎮 GAMING ZONE PRO</header>

<div class="container">
  <div class="game-box">Free Fire</div>
  <div class="game-box">PUBG</div>
  <div class="game-box">BGMI</div>
  <div class="game-box">Call of Duty</div>
</div>

<footer>🔥 Made for Gamers | 2026</footer>

</body>
</html>
